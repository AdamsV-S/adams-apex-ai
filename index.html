<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adams Apex AI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<header>
  <h1>Adams Apex AI</h1>
  <p>Smart Trading Intelligence</p>
</header>

<main class="dashboard">

  <section class="card">
    <h2>Balance</h2>
    <p>$12,450.00</p>
  </section>

  <section class="card">
    <h2>AI Signal</h2>
    <p id="signal">BUY EUR/USD</p>
  </section>

  <section class="card">
    <h2>Market Mood</h2>
    <p>Bullish</p>
  </section>

  <section class="card">
    <button onclick="runAI()">Run AI Analysis</button>
  </section>

</main>

<script src="app.js"></script>

</body>
</html>
